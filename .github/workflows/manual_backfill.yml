name: Manual Weather Backfill

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '단일 날짜 백필 (YYYY-MM-DD). 입력 시 이 날짜만 처리'
        required: false
        default: ''
      start_date:
        description: '기간 백필 시작일 (YYYY-MM-DD)'
        required: false
        default: ''
      end_date:
        description: '기간 백필 종료일 (YYYY-MM-DD)'
        required: false
        default: ''
      dry_run:
        description: '1이면 시트에 쓰지 않고 로그만 확인'
        required: false
        default: '0'

concurrency:
  group: weather-backfill-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backfill-job:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      TZ: Asia/Seoul
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 라이브러리 설치하기
        run: |
          python -V
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 실행 파라미터 출력
        run: |
          echo "TARGET_DATE=${{ github.event.inputs.target_date }}"
          echo "START_DATE=${{ github.event.inputs.start_date }}"
          echo "END_DATE=${{ github.event.inputs.end_date }}"
          echo "DRY_RUN=${{ github.event.inputs.dry_run }}"

      - name: 과거 날씨 데이터 백필 실행
        env:
          KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
          GOOGLE_SHEET_KEY: ${{ secrets.GOOGLE_SHEET_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          START_DATE: ${{ github.event.inputs.start_date }}
          END_DATE: ${{ github.event.inputs.end_date }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail
          python backfill.py
